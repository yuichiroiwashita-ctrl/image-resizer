<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像リサイズくん - 簡単一括リサイズ・トリミング</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        input:checked + .option-content {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-900">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-2">画像リサイズくん</h1>
            <p class="text-slate-600 font-medium">指定サイズに合わせて一括でリサイズ・トリミングを行います</p>
        </div>

        <!-- Size Settings -->
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 mb-6">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                出力サイズの設定
            </h2>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">幅 (Width) px</label>
                    <input type="number" id="inputWidth" value="1200" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono text-lg">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">高さ (Height) px</label>
                    <input type="number" id="inputHeight" value="630" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono text-lg">
                </div>
            </div>

            <div class="mb-4 text-sm font-bold text-slate-700 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                どちらの方法でリサイズしますか？
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Option: Cover (トリミングあり) -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="resizeMode" value="cover" class="peer sr-only" checked>
                    <div class="p-4 border-2 border-slate-200 rounded-2xl bg-white peer-checked:border-blue-500 peer-checked:ring-4 peer-checked:ring-blue-50 transition-all h-full flex flex-col items-center text-center">
                        <div class="mb-4 bg-slate-100 p-2 rounded-xl w-full flex justify-center">
                            <svg width="160" height="100" viewBox="0 0 160 100">
                                <rect x="10" y="10" width="140" height="80" rx="4" fill="#fca5a5" />
                                <path d="M10 90 L50 40 L90 90 Z" fill="#ef4444" opacity="0.6"/>
                                <path d="M60 90 L110 30 L150 90 Z" fill="#ef4444" opacity="0.8"/>
                                <circle cx="120" cy="35" r="10" fill="#fcd34d" />
                                <rect x="35" y="25" width="90" height="50" fill="none" stroke="#1e293b" stroke-width="3" stroke-dasharray="6,4" />
                                <text x="80" y="55" text-anchor="middle" font-size="10" font-weight="extrabold" fill="#1e293b">指定サイズ</text>
                                <rect x="10" y="10" width="25" height="80" fill="white" opacity="0.4" />
                                <rect x="125" y="10" width="25" height="80" fill="white" opacity="0.4" />
                            </svg>
                        </div>
                        <span class="block text-lg font-bold text-slate-800">枠に合わせて切り取る</span>
                        <span class="block text-xs text-slate-500 mt-2 leading-relaxed">指定サイズを隙間なく埋めます。<br>はみ出た端はカットされます。</span>
                    </div>
                </label>

                <!-- Option: Contain (余白あり) -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="resizeMode" value="contain" class="peer sr-only">
                    <div class="p-4 border-2 border-slate-200 rounded-2xl bg-white peer-checked:border-blue-500 peer-checked:ring-4 peer-checked:ring-blue-50 transition-all h-full flex flex-col items-center text-center">
                        <div class="mb-4 bg-slate-100 p-2 rounded-xl w-full flex justify-center">
                            <svg width="160" height="100" viewBox="0 0 160 100">
                                <rect x="20" y="15" width="120" height="70" fill="white" stroke="#1e293b" stroke-width="2" stroke-dasharray="6,4" />
                                <rect x="45" y="15" width="70" height="70" rx="2" fill="#93c5fd" />
                                <path d="M45 85 L65 55 L85 85 Z" fill="#3b82f6" opacity="0.6"/>
                                <path d="M70 85 L95 45 L115 85 Z" fill="#3b82f6" opacity="0.8"/>
                                <circle cx="100" cy="35" r="6" fill="#fcd34d" />
                                <text x="32" y="53" text-anchor="middle" font-size="9" font-weight="bold" fill="#94a3b8">余白</text>
                                <text x="128" y="53" text-anchor="middle" font-size="9" font-weight="bold" fill="#94a3b8">余白</text>
                            </svg>
                        </div>
                        <span class="block text-lg font-bold text-slate-800">全体を収める</span>
                        <span class="block text-xs text-slate-500 mt-2 leading-relaxed">元の画像を一切削らずに縮小します。<br>サイズに合わない所に余白ができます。</span>
                    </div>
                </label>
            </div>
        </div>

        <!-- Privacy Warning -->
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6 flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-amber-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <div class="text-xs text-amber-800 leading-relaxed">
                <p class="font-bold mb-1">【重要】プライバシーへの配慮をお願いします</p>
                <p>お子様の名札や個人の特定につながる情報が写っている場合は、あらかじめ加工ソフト等で伏せ字処理を行ってください。このツールでは人物情報の自動削除機能は備えておりません。公開前に必ずご自身で内容をご確認ください。</p>
            </div>
        </div>

        <!-- Drop Zone -->
        <div id="dropZone" class="drop-zone bg-white rounded-3xl p-12 text-center cursor-pointer mb-8 shadow-sm hover:shadow-xl transition-all border-blue-200 border-2">
            <div class="flex flex-col items-center">
                <div class="bg-blue-600 p-5 rounded-full mb-4 shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" />
                    </svg>
                </div>
                <p class="text-2xl text-slate-800 font-black">ここに画像をドロップ！</p>
                <p class="text-sm text-slate-400 mt-2 font-medium font-bold">複数枚まとめて一括処理できます</p>
            </div>
            <input type="file" id="fileInput" class="hidden" accept="image/*" multiple>
        </div>

        <!-- Controls -->
        <div id="controls" class="hidden mb-6 flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="text-slate-700 font-bold flex items-center gap-2">
                <span class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center text-lg shadow-md" id="fileCount">0</span>
                <span>枚処理済み</span>
            </div>
            <div class="flex gap-3">
                <button id="clearBtn" class="text-slate-400 hover:text-red-500 px-4 py-2 rounded-lg font-bold transition-colors text-sm">やり直し</button>
                <button id="downloadAllBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-black transition-all flex items-center gap-2 shadow-xl shadow-blue-200 active:scale-95">
                    まとめて保存する
                </button>
            </div>
        </div>

        <!-- Preview Area -->
        <div id="previewContainer" class="grid grid-cols-1 gap-4 mb-16"></div>

        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 font-black translate-y-4"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const controls = document.getElementById('controls');
        const fileCountSpan = document.getElementById('fileCount');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');
        const toast = document.getElementById('toast');
        const inputWidth = document.getElementById('inputWidth');
        const inputHeight = document.getElementById('inputHeight');

        let processedImages = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over', 'scale-[1.02]'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over', 'scale-[1.02]'); });
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drag-over', 'scale-[1.02]'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });
        clearBtn.addEventListener('click', () => { processedImages = []; previewContainer.innerHTML = ''; controls.classList.add('hidden'); fileInput.value = ''; });

        async function handleFiles(files) {
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            if (imageFiles.length === 0) return;
            const targetW = parseInt(inputWidth.value) || 1200;
            const targetH = parseInt(inputHeight.value) || 630;
            const mode = document.querySelector('input[name="resizeMode"]:checked').value;
            showToast(`${imageFiles.length}枚の画像を加工中...`);
            controls.classList.remove('hidden');
            for (const file of imageFiles) { await processImage(file, targetW, targetH, mode === 'contain'); }
            fileCountSpan.textContent = processedImages.length;
        }

        function processImage(file, targetW, targetH, isContain) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        let drawW, drawH, x, y;
                        if (isContain) {
                            const scale = Math.min(targetW / img.width, targetH / img.height);
                            drawW = img.width * scale;
                            drawH = img.height * scale;
                            canvas.width = drawW; canvas.height = drawH;
                            x = 0; y = 0;
                        } else {
                            canvas.width = targetW; canvas.height = targetH;
                            const scale = Math.max(targetW / img.width, targetH / img.height);
                            drawW = img.width * scale; drawH = img.height * scale;
                            x = (targetW / 2) - (drawW / 2); y = (targetH / 2) - (drawH / 2);
                        }
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, x, y, drawW, drawH);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                        const timestamp = new Date().getTime();
                        const fileName = `${Math.round(canvas.width)}x${Math.round(canvas.height)}_${timestamp}_${file.name.split('.')[0]}.jpg`;
                        processedImages.push({ name: fileName, data: dataUrl });
                        createPreviewElement(file.name, dataUrl, canvas.width, canvas.height, fileName);
                        resolve();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function createPreviewElement(originalName, dataUrl, w, h, outputFileName) {
            const div = document.createElement('div');
            div.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-200 animate-in fade-in slide-in-from-bottom-2 duration-300 hover:border-blue-400 transition-colors";
            div.innerHTML = `
                <div class="flex flex-col sm:flex-row gap-5 items-center">
                    <div class="w-full sm:w-44 h-28 flex-shrink-0 flex justify-center items-center bg-slate-50 rounded-xl border border-slate-100 overflow-hidden shadow-inner">
                        <img src="${dataUrl}" class="max-w-full max-h-full object-contain" alt="Preview">
                    </div>
                    <div class="flex-grow min-w-0 text-center sm:text-left">
                        <p class="text-base font-black text-slate-800 truncate" title="${originalName}">${originalName}</p>
                        <div class="flex flex-wrap justify-center sm:justify-start gap-2 mt-2">
                            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-black border border-blue-100">${Math.round(w)} × ${Math.round(h)} px</span>
                        </div>
                    </div>
                    <div class="flex-shrink-0 w-full sm:w-auto">
                        <button onclick="downloadSingle('${dataUrl}', '${outputFileName}')" class="w-full flex items-center justify-center gap-2 text-sm bg-slate-800 text-white hover:bg-blue-600 px-6 py-4 rounded-xl transition-all font-black active:scale-95 shadow-lg shadow-slate-100 font-bold">保存</button>
                    </div>
                </div>
            `;
            previewContainer.prepend(div);
        }

        window.downloadSingle = (url, name) => {
            const link = document.createElement('a');
            link.href = url; link.download = name;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        downloadAllBtn.addEventListener('click', async () => {
            if (processedImages.length === 0) return;
            const zip = new JSZip();
            processedImages.forEach(img => { const imageData = img.data.split(',')[1]; zip.file(img.name, imageData, { base64: true }); });
            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `リサイズ画像_${new Date().getTime()}.zip`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            showToast("すべての画像をまとめました！");
        });

        function showToast(message) {
            toast.textContent = message; toast.classList.remove('opacity-0', 'translate-y-4'); toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-4'); toast.classList.remove('opacity-100', 'translate-y-0'); }, 3000);
        }
    </script>
</body>
</html>
